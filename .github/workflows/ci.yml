name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-spend-audit/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ai-spend-audit

      - name: Lint
        run: npm run lint
        working-directory: ai-spend-audit

      - name: Run tests
        run: npm test
        working-directory: ai-spend-audit

      - name: Build
        run: npm run build
        working-directory: ai-spend-audit
